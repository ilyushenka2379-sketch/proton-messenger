<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Proton - Chat</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); width: 95vw; max-width: 900px; height: 90vh; display: flex; overflow: hidden; box-sizing: border-box; }
        
        /* Sidebar layout with rooms explorer navigation */
        .sidebar { width: 250px; background: #1e293b; color: white; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; flex-shrink: 0; box-sizing: border-box; }
        .sidebar-brand { font-size: 20px; font-weight: bold; margin: 0 0 15px 0; }
        
        /* Interactive rooms navigator elements */
        .rooms-title { font-size: 11px; text-transform: uppercase; color: #64748b; font-weight: bold; margin: 15px 0 8px 0; letter-spacing: 0.5px; }
        .rooms-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px; }
        .room-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background 0.2s; display: flex; align-items: center; gap: 8px; }
        .room-item:hover { background: #334155; }
        .room-item.active { background: #007bff; font-weight: bold; }
        
        .logout-btn { background: none; border: none; color: #f87171; cursor: pointer; font-weight: bold; font-size: 15px; text-align: left; padding: 5px 0; transition: color 0.2s; }
        .logout-btn:hover { color: #ef4444; }

        .chat-area { flex: 1; background: #f5f7fb; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; position: relative; }
        
        /* Scrollbar configuration specs */
        #messages::-webkit-scrollbar, .rooms-list::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-track, .rooms-list::-webkit-scrollbar-track { background: transparent; }
        #messages::-webkit-scrollbar-thumb, .rooms-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        #messages::-webkit-scrollbar-thumb:hover, .rooms-list::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        #messages { flex: 1; overflow-y: auto; padding: 10px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 75%; word-break: break-word; font-size: 15px; animation: slideUp 0.25s ease-out forwards; opacity: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .msg.my { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg.other { background: white; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        .msg .author { font-size: 11px; opacity: 0.7; margin-bottom: 4px; font-weight: bold; cursor: pointer; }
        .msg .author:hover { text-decoration: underline; }
        .msg img, .msg video, .msg audio { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; }
        .msg audio { max-height: 40px; }
        
        #form { display: flex; gap: 10px; align-items: center; width: 100%; box-sizing: border-box; position: relative; background: white; padding: 8px 14px; border-radius: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        #input { flex: 1; padding: 8px 4px; border: none; font-size: 16px; min-width: 0; background: transparent; }
        #input:focus { outline: none; }
        
        #file-input { display: none; }
        
        .file-label, .record-btn, .emoji-btn { background: transparent; color: #8a8a8a; height: 36px; width: 36px; border: none; display: flex; align-items: center; justify-content: center; box-sizing: border-box; flex-shrink: 0; font-size: 20px; cursor: pointer; transition: color 0.2s ease, transform 0.1s ease; user-select: none; }
        .file-label:hover, .record-btn:hover, .emoji-btn:hover { color: #4b5563; }
        .file-label:active, .record-btn:active, .emoji-btn:active { transform: scale(0.9); }
        
        .record-btn.recording { color: #dc3545; animation: pulse 1s infinite; }
        .btn-main { background: #007bff; color: white; border: none; height: 36px; padding: 0 16px; font-size: 14px; border-radius: 18px; cursor: pointer; font-weight: bold; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.2s ease, transform 0.1s ease; }
        .btn-main:hover { background: #0056b3; }
        .btn-main:active { transform: scale(0.95); }

        .msg .author.premium-user { color: #d4af37 !important; font-weight: 900; text-shadow: 0 0 3px rgba(212, 175, 55, 0.5); }
        .premium-crown { margin-right: 4px; font-size: 12px; vertical-align: middle; }

        .emoji-picker { display: none; position: absolute; bottom: 65px; left: 15px; width: 280px; background: white; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 10px; z-index: 100; box-sizing: border-box; opacity: 0; transition: opacity 0.2s ease; pointer-events: none; }
        .emoji-picker.active { display: block; opacity: 1; pointer-events: auto; }
        .emoji-section-title { font-size: 12px; font-weight: bold; color: #64748b; margin: 5px 0; text-transform: uppercase; letter-spacing: 0.5px; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; max-height: 120px; overflow-y: auto; margin-bottom: 10px; }
        .emoji-item { font-size: 20px; text-align: center; padding: 4px; cursor: pointer; border-radius: 4px; transition: background 0.1s; user-select: none; }
        .emoji-item:hover { background: #f1f5f9; }
        
        .emoji-item.premium-slot { position: relative; background: #fff9e6; border: 1px dashed #ffe0b2; display: flex; align-items: center; justify-content: center; height: 32px; width: 32px; margin: 0 auto; border-radius: 4px; }
        .emoji-item.premium-slot::after { content: "🔒"; position: absolute; bottom: -2px; right: -2px; font-size: 9px; z-index: 2; }
        .emoji-item.premium-slot:hover { background: #fff3cd; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <!-- LEFT SIDEBAR WITH AUTO CHATS ROUTING -->
        <div class="sidebar">
            <div style="display: flex; flex-direction: column; flex: 1; min-height: 0;">
                <h3 class="sidebar-brand">Proton Chat 💬</h3>
                
                <div class="rooms-title">Channels</div>
                <div class="room-item active" id="room-global" onclick="switchChat('global', 'Global Chat')">🌍 Global Chat</div>
                
                <div class="rooms-title">Direct Messages</div>
                <div class="rooms-list" id="users-directory">
                    <!-- Loaded dynamically via JS pipeline -->
                </div>
            </div>
            <div>
                <div id="current-profile-display" style="font-size: 12px; color: #94a3b8; margin-bottom: 10px; font-weight: bold; border-top: 1px solid #334155; padding-top: 10px;"></div>
                <!-- ЗАМЕНИ ЭТУ СТРОКУ В CHAT.HTML: -->
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- RIGHT CHAT AREA -->
        <div class="chat-area">
            <!-- Dynamic context target title channel header -->
            <div id="chat-header" style="font-size: 16px; font-weight: bold; margin-bottom: 10px; color: #1e293b; padding-bottom: 8px; border-bottom: 1px solid #e2e8f0;">🌍 Global Chat</div>
            
            <div id="messages"></div>
            
            <div id="form">
                <div id="emoji-picker" class="emoji-picker">
                    <div class="emoji-section-title">Standard</div>
                    <div class="emoji-grid" id="standard-emojis"></div>
                    
                    <div class="emoji-section-title" style="color: #b8860b;">👑 Proton Premium (7 Slots)</div>
                    <div class="emoji-grid" id="premium-emojis"></div>
                </div>

                <label class="file-label" for="file-input">📎</label>
                <input type="file" id="file-input" accept="image/*,video/*" onchange="uploadImage(this)" />
                
                <!-- Замени старую кнопку на эту (с текстом REC вместо смайлика) -->
                <button id="record-button" class="record-btn" onclick="toggleRecording()">REC</button>
                <button type="button" class="emoji-btn" onclick="toggleEmojiPicker()">😀</button>
                
                <input id="input" autocomplete="off" placeholder="Type a message..." />
                <button class="btn-main" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
