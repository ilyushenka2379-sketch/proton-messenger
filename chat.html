<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Proton - Chat</title>
    <style>
        :root { --bg-app: #f0f2f5; --bg-container: white; --text-main: #1e293b; --border-color: #e2e8f0; --bg-msg-other: white; }
        [data-theme="dark"] { --bg-app: #0f172a; --bg-container: #1e293b; --text-main: #f8fafc; --border-color: #334155; --bg-msg-other: #334155; }
        
        body { font-family: Arial, sans-serif; margin: 0; background: var(--bg-app); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; transition: background 0.3s, color 0.3s; }
        .container { background: var(--bg-container); border-radius: 12px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05); width: 95vw; max-width: 900px; height: 90vh; display: flex; overflow: hidden; box-sizing: border-box; }
        
        .sidebar { width: 250px; background: #111827; color: white; padding: 20px; display: flex; flex-direction: column; justify-content: space-between; flex-shrink: 0; box-sizing: border-box; }
        .sidebar-brand { font-size: 20px; font-weight: bold; margin: 0 0 15px 0; }
        
        .rooms-title { font-size: 11px; text-transform: uppercase; color: #64748b; font-weight: bold; margin: 15px 0 8px 0; letter-spacing: 0.5px; }
        .rooms-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; margin-bottom: 15px; }
        
        .room-item { padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background 0.2s; display: flex; align-items: center; gap: 10px; position: relative; color: #cbd5e1; }
        .room-item:hover { background: #1f2937; color: white; }
        .room-item.active { background: #007bff; font-weight: bold; color: white; }
        
        .avatar-circle { width: 32px; height: 32px; border-radius: 50%; background-size: cover; background-position: center; flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }
        
        /* СТИЛЬНАЯ СТИЛИЗАЦИЯ ДЛЯ ТЕКСТОВОЙ АВАТАРКИ GLOBAL ЧАТА */
        .avatar-circle.global-avatar {
            background: linear-gradient(135deg, #38bdf8 0%, #007bff 100%);
            color: white;
            font-size: 7px;
            font-weight: 900;
            letter-spacing: 0.2px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.2);
            user-select: none;
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #94a3b8; position: absolute; right: 12px; top: 20px; }
        .status-dot.online { background: #10b981; box-shadow: 0 0 8px #10b981; }

        .sidebar-footer-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 14px; text-align: left; padding: 5px 0; display: block; width: 100%; transition: color 0.2s; font-weight: bold; }
        .sidebar-footer-btn:hover { color: white; }
        .logout-btn { color: #f87171; } .logout-btn:hover { color: #ef4444; }

        .chat-area { flex: 1; background: var(--bg-app); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; position: relative; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        #messages::-webkit-scrollbar, .rooms-list::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb, .rooms-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        .msg { padding: 10px 14px; border-radius: 12px; max-width: 75%; word-break: break-word; font-size: 15px; animation: slideUp 0.25s ease-out forwards; opacity: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); display: flex; gap: 10px; align-items: flex-start; }
        .msg.my { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; flex-direction: row-reverse; }
        .msg.other { background: var(--bg-msg-other); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }
        .msg-body { flex: 1; }
        .msg .author { font-size: 11px; opacity: 0.7; margin-bottom: 4px; font-weight: bold; cursor: pointer; display: inline-block; }
        .msg .author:hover { text-decoration: underline; }
        .msg img.chat-media, .msg video, .msg audio { max-width: 100%; border-radius: 8px; margin-top: 5px; display: block; }
        .msg audio { max-height: 40px; }
        .msg-time { font-size: 10px; opacity: 0.6; float: right; margin-top: 4px; margin-left: 10px; user-select: none; }
        
        #form { display: flex; gap: 10px; align-items: center; width: 100%; box-sizing: border-box; background: var(--bg-container); padding: 8px 14px; border-radius: 20px; border: 1px solid var(--border-color); }
        #input { flex: 1; padding: 8px 4px; border: none; font-size: 16px; min-width: 0; background: transparent; color: var(--text-main); }
        #input:focus { outline: none; }
        #file-input { display: none; }
        
        .file-label, .record-btn, .emoji-btn { background: transparent; color: #8a8a8a; height: 36px; width: 36px; border: none; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; font-weight: bold; cursor: pointer; transition: color 0.2s; user-select: none; }
        .file-label:hover, .record-btn:hover, .emoji-btn:hover { color: #007bff; }
        .record-btn.recording { color: #dc3545; animation: pulse 1s infinite; }
        .btn-main { background: #007bff; color: white; border: none; height: 36px; padding: 0 16px; font-size: 14px; border-radius: 18px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-main:hover { background: #0056b3; }

        .emoji-picker { display: none; position: absolute; bottom: 65px; left: 15px; width: 280px; background: var(--bg-container); border: 1px solid var(--border-color); border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 10px; z-index: 100; box-sizing: border-box; }
        .emoji-picker.active { display: block; }
        .emoji-section-title { font-size: 12px; font-weight: bold; color: #64748b; margin: 5px 0; text-transform: uppercase; }
        .emoji-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; max-height: 120px; overflow-y: auto; }
        .emoji-item { font-size: 20px; text-align: center; padding: 4px; cursor: pointer; border-radius: 4px; }
        .emoji-item:hover { background: rgba(0,0,0,0.05); }
        .emoji-item.premium-slot { position: relative; background: #fff9e6; border: 1px dashed #ffe0b2; display: flex; align-items: center; justify-content: center; height: 32px; width: 32px; margin: 0 auto; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: var(--bg-container); border-radius: 12px; padding: 25px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); text-align: center; position: relative; border: 1px solid var(--border-color); }
        .modal-close { position: absolute; top: 12px; right: 12px; cursor: pointer; font-size: 18px; color: #8492a6; }
        .modal-avatar-preview { width: 80px; height: 80px; border-radius: 50%; background: #cbd5e1; margin: 0 auto 15px auto; background-size: cover; background-position: center; position: relative; }
        .modal-status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: bold; margin-top: 10px; background: #cbd5e1; color: #475569; }
        .modal-status-badge.online { background: #d1fae5; color: #065f46; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div style="display: flex; flex-direction: column; flex: 1; min-height: 0;">
                <h3 class="sidebar-brand">Proton Chat</h3>
                <div class="rooms-title">Channels</div>
                
                <!-- Добавлена круглая аватарка GLOBAL в левую панель -->
                <div class="room-item active" id="room-global" onclick="switchChat('global', 'Global Chat')">
                    <span class="avatar-circle global-avatar">Global</span>
                    Global Chat
                </div>
                
                <div class="rooms-title">Direct Messages</div>
                <div class="rooms-list" id="users-directory"></div>
            </div>
            <div>
                <div id="current-profile-display" style="font-size: 12px; color: #94a3b8; margin-bottom: 10px; font-weight: bold; border-top: 1px solid #334155; padding-top: 10px; display: flex; align-items: center; gap: 8px;"></div>
                <button class="sidebar-footer-btn" onclick="openSettingsModal()">Settings</button>
                <button class="sidebar-footer-btn logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="chat-area">
            <!-- Добавлена аватарка GLOBAL в верхнюю шапку активного чата -->
            <div id="chat-header-container" style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color);">
                <span id="chat-header-avatar" class="avatar-circle global-avatar">Global</span>
                <div id="chat-header" style="font-size: 16px; font-weight: bold;">Global Chat</div>
            </div>
            
            <div id="messages"></div>
            
            <div id="form">
                <div id="emoji-picker" class="emoji-picker">
                    <div class="emoji-section-title">Standard</div>
                    <div class="emoji-grid" id="standard-emojis"></div>
                    <div class="emoji-section-title" style="color: #b8860b;">Proton Premium</div>
                    <div class="emoji-grid" id="premium-emojis"></div>
                </div>

                <!-- Заменили [F] на скрепку 📎 -->
                <label class="file-label" for="file-input">📎</label>
                <input type="file" id="file-input" accept="image/*,video/*" onchange="uploadImage(this)" />
    
                <!-- Заменили REC на микрофон 🎤 -->
                <button id="record-button" class="record-btn" onclick="toggleRecording()">🎤</button>
    
                <!-- Заменили SMILE на смайлик 😀 -->
                <button type="button" class="emoji-btn" onclick="toggleEmojiPicker()">😀</button>
    
                <input id="input" autocomplete="off" placeholder="Type a message..." />
                <button class="btn-main" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="modal-overlay" onclick="closeModal(this, event)">
        <div class="modal-card">
            <span class="modal-close" onclick="closeSettingsModal()">[x]</span>
            <h3>Profile Settings</h3>
            <div id="settings-avatar-preview" class="modal-avatar-preview"></div>
            <label class="btn-main" style="display:inline-block; line-height:36px; height:36px; padding:0 15px; margin-bottom: 20px; cursor:pointer;">
                Upload Avatar <input type="file" accept="image/*" style="display:none;" onchange="handleSettingsAvatar(this)">
            </label>
            <div style="margin-top: 10px;">
                <label style="font-weight:bold; display:block; margin-bottom: 8px;">Theme Select:</label>
                <select id="theme-selector" onchange="handleSettingsTheme(this.value)" style="width:100%; padding:10px; border-radius:6px; background:var(--bg-app); color:var(--text-main); border:1px solid var(--border-color);">
                    <option value="light">Light Theme</option>
                    <option value="dark">Dark Theme</option>
                </select>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="modal-overlay" onclick="closeModal(this, event)">
        <div class="modal-card">
            <span class="modal-close" onclick="closeProfileModal()">[x]</span>
            <div id="view-profile-avatar" class="modal-avatar-preview" style="width:100px; height:100px; margin-top:15px;"></div>
            <h2 id="view-profile-name" style="margin:5px 0;"></h2>
            <div id="view-profile-status" class="modal-status-badge"></div>
            <div style="margin-top:20px;">
                <button id="view-profile-pm-btn" class="btn-main" style="width:100%;">Private Message</button>
            </div>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
