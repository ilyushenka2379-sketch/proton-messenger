<body>

    <h2>Messenger Proton 🚀</h2>
    
    <!-- Блок для видеозвонка -->
    <div id="video-container" style="margin-bottom: 15px;">
        <video id="localVideo" autoplay playsinline muted style="width: 120px; background: #333; border-radius: 8px;"></video>
        <video id="remoteVideo" autoplay playsinline style="width: 250px; background: #222; border-radius: 8px; margin-left: 10px;"></video>
        <div style="margin-top: 5px;">
            <button id="callBtn" onclick="startCall()" style="background: #28a745;">📞 Позвонить</button>
            <button id="hangupBtn" onclick="hangUp()" style="background: #dc3545; display: none;">🛑 Положить трубку</button>
        </div>
    </div>

    <div id="chat">
        <div id="messages"></div>
        <div id="form">
            <input id="input" autocomplete="off" placeholder="Type something..." />
            <button onclick="sendMessage()">Send Message</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
