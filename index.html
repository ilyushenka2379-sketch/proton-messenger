<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Proton - Quantum Login</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
        }

        /* Glassmorphism Matrix Card Container */
        .container { 
            background: rgba(30, 41, 59, 0.45); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px; 
            padding: 40px 30px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1); 
            width: 380px; 
            text-align: center; 
            box-sizing: border-box; 
            animation: fadeIn 0.6s ease-out forwards;
        }

        h2 {
            color: #ffffff;
            font-size: 26px;
            margin: 0 0 8px 0;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 0 0 15px rgba(0, 123, 255, 0.4);
        }

        p {
            color: #94a3b8;
            font-size: 14px;
            margin: 0 0 25px 0;
            line-height: 1.5;
        }

        .hidden { display: none !important; }

        /* Futuristic Input Fields Custom Build */
        input { 
            width: 100%; 
            padding: 14px 16px; 
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px; 
            font-size: 15px; 
            color: #ffffff;
            margin-bottom: 16px; 
            box-sizing: border-box; 
            transition: all 0.25s ease; 
        }
        input::placeholder { color: #475569; }
        input:focus { 
            outline: none; 
            border-color: #007bff; 
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25), 0 0 15px rgba(0, 123, 255, 0.2); 
        }

        /* Neon Active Push Button Configuration */
        .btn-main { 
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%); 
            color: white; 
            border: none; 
            padding: 14px; 
            width: 100%; 
            font-size: 16px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
            transition: all 0.2s ease; 
        }
        .btn-main:hover { 
            background: linear-gradient(135deg, #1e90ff 0%, #007bff 100%); 
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.5);
            transform: translateY(-1px);
        }
        .btn-main:active { transform: translateY(1px); box-shadow: 0 2px 10px rgba(0, 123, 255, 0.3); }

        #error-message { 
            color: #f87171; 
            font-size: 13px; 
            margin-bottom: 16px; 
            font-weight: 600; 
            text-align: left; 
            padding: 10px 12px;
            background: rgba(220, 53, 69, 0.15);
            border-left: 3px solid #dc3545;
            border-radius: 4px;
        }

        .toggle-auth { margin-top: 20px; font-size: 13px; color: #64748b; }
        .toggle-auth span { color: #38bdf8; cursor: pointer; font-weight: 600; text-decoration: none; transition: color 0.2s; }
        .toggle-auth span:hover { color: #7dd3fc; text-shadow: 0 0 8px rgba(56, 189, 248, 0.4); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <div class="container">
        <h2 id="auth-title">Login to Proton 🚀</h2>
        <p id="auth-subtitle">Enter nickname and password to start chatting.</p>
        
        <div id="error-message" class="hidden"></div>
        
        <input type="text" id="auth-nickname" placeholder="Enter nickname..." autocomplete="off" />
        <input type="password" id="auth-password" placeholder="Enter password..." />
        <button id="login-button" class="btn-main" onclick="handleAuth()">Sign In</button>

        <div class="toggle-auth" id="toggle-container">
            Don't have an account? <span onclick="toggleAuthMode()">Register</span>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
