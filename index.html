<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Proton - Login</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; box-sizing: border-box; }
        .hidden { display: none !important; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-main { background: #007bff; color: white; border: none; padding: 12px; width: 100%; font-size: 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-main:hover { background: #0056b3; }
        #error-message { color: #dc3545; font-size: 14px; margin-bottom: 15px; font-weight: bold; text-align: left; }
        .toggle-auth { margin-top: 15px; font-size: 14px; color: #555; }
        .toggle-auth span { color: #007bff; cursor: pointer; font-weight: bold; text-decoration: underline; }
        .toggle-auth span:hover { color: #0056b3; }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="auth-title">Login to Proton 🚀</h2>
        <p id="auth-subtitle">Enter nickname and password to start chatting.</p>
        
        <div id="error-message" class="hidden"></div>
        
        <input type="text" id="auth-nickname" placeholder="Enter nickname..." />
        <input type="password" id="auth-password" placeholder="Enter password..." />
        <button id="login-button" class="btn-main" onclick="handleAuth()">Sign In</button>

        <div class="toggle-auth" id="toggle-container">
            Don't have an account? <span onclick="toggleAuthMode()">Register</span>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
