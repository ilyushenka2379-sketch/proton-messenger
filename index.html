<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Proton - Quantum Login</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* Глобальные переменные для переключения тем экрана авторизации */
        :root {
            --bg-body: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
            --bg-card: rgba(30, 41, 59, 0.45);
            --border-card: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --bg-input: rgba(15, 23, 42, 0.6);
            --text-input: #ffffff;
            --btn-toggle-bg: rgba(255, 255, 255, 0.05);
        }

        [data-auth-theme="white"] {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --border-card: rgba(0, 0, 0, 0.08);
            --text-main: #111111;
            --text-muted: #64748b;
            --bg-input: #f8fafc;
            --text-input: #111111;
            --btn-toggle-bg: #e2e8f0;
        }

        body { 
            background: var(--bg-body); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden;
            transition: background 0.3s ease;
        }

        .container { 
            background: var(--bg-card); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-card);
            border-radius: 16px; 
            padding: 35px 30px; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3); 
            width: 380px; 
            text-align: center; 
            position: relative;
            animation: fadeIn 0.5s ease-out forwards;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        /* Переключатель тем внутри формы */
        .auth-theme-selector {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 20px;
        }
        .auth-theme-btn {
            background: var(--btn-toggle-bg);
            color: var(--text-muted);
            border: 1px solid var(--border-card);
            padding: 6px 16px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .auth-theme-btn:hover { color: var(--text-main); }
        .auth-theme-btn.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.3);
        }

        h2 { color: var(--text-main); font-size: 24px; margin: 0 0 6px 0; font-weight: 700; transition: color 0.3s; }
        p { color: var(--text-muted); font-size: 14px; margin: 0 0 20px 0; transition: color 0.3s; }
        .hidden { display: none !important; }

        input { 
            width: 100%; 
            padding: 13px 16px; 
            background: var(--bg-input);
            border: 1px solid var(--border-card); 
            border-radius: 8px; 
            font-size: 15px; 
            color: var(--text-input);
            margin-bottom: 14px; 
            box-sizing: border-box; 
            transition: all 0.2s ease; 
        }
        input:focus { outline: none; border-color: #007bff; box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.2); }

        .btn-main { 
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%); 
            color: white; border: none; padding: 13px; width: 100%; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 15px rgba(0, 123, 255, 0.2); transition: all 0.2s; 
        }
        .btn-main:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4); }

        #error-message { 
            color: #f87171; font-size: 13px; margin-bottom: 14px; font-weight: 600; text-align: left; padding: 10px; background: rgba(220, 53, 69, 0.1); border-left: 3px solid #dc3545; border-radius: 4px;
        }
        .toggle-auth { margin-top: 18px; font-size: 13px; color: var(--text-muted); }
        .toggle-auth span { color: #38bdf8; cursor: pointer; font-weight: 600; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <!-- ТУМБЛЕР ВЫБОРА ТЕМЫ ЭКРАНА ВХОДА -->
        <div class="auth-theme-selector">
            <button id="auth-btn-white" class="auth-theme-btn" onclick="changeAuthTheme('white')">White</button>
            <button id="auth-btn-dark" class="auth-theme-btn active" onclick="changeAuthTheme('dark')">Dark</button>
        </div>

        <h2 id="auth-title">Login to Proton 🚀</h2>
        <p id="auth-subtitle">Enter nickname and password to start chatting.</p>
        
        <div id="error-message" class="hidden"></div>
        
        <input type="text" id="auth-nickname" placeholder="Enter nickname..." autocomplete="off" />
        <input type="password" id="auth-password" placeholder="Enter password..." />
        <button id="login-button" class="btn-main" onclick="handleAuth()">Sign In</button>

        <div class="toggle-auth" id="toggle-container">
            Don't have an account? <span onclick="toggleAuthMode()">Register</span>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
